# Render Blueprint — KaneCLI TestPilot
# Renders only the API (thin trigger + relay). The Next.js frontend is hosted on
# Vercel (kane-cli-test-pilot.vercel.app) for instant, cold-start-free loads.
# Apply via Render → New → Blueprint, pointed at this repo. You'll be prompted
# for the values marked `sync: false` (your secrets + the cross-service URLs).
services:
  # ── API (thin: dispatches the CI pipeline + relays live events) ───────────
  # The heavy pipeline runs in GitHub Actions (.github/workflows/pipeline.yml),
  # so this service only triggers runs and relays progress — it stays tiny and
  # is comfortable on the free 512MB plan. kane-cli/gh/Chrome are NOT installed
  # here; the LT/Anthropic creds live as GitHub Actions secrets, not here.
  - type: web
    name: kane-testpilot-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DEMO_MODE
        value: "false"
      - key: LOCAL_EXECUTION  # false → dispatch a GitHub Actions job per run
        value: "false"
      - key: RUNNER_REPO      # repo hosting .github/workflows/pipeline.yml
        value: SparshKesari/Kane-CLI-Test-Pilot
      - key: RUNNER_REF       # branch the workflow_dispatch runs on (must be default)
        value: main
      - key: PUBLIC_BASE_URL  # this API's own https URL (CI posts events here)
        sync: false
      - key: INGEST_SECRET    # shared with the GitHub Actions secret of the same name
        sync: false
      - key: GITHUB_TOKEN     # PAT with `actions:write` + `workflow` to dispatch
        sync: false
      - key: FRONTEND_ORIGIN  # https URL of the Vercel frontend (for CORS)
        sync: false

# Frontend is on Vercel (root dir: frontend/, env NEXT_PUBLIC_API → the API URL),
# not Render — see DEPLOY.md.
